server {
    listen 80;
    server_name stayhere.madhab-mondal.me;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name stayhere.madhab-mondal.me;

    # SSL Certificate Paths (Managed by Certbot on the host)
    ssl_certificate /etc/letsencrypt/live/stayhere.madhab-mondal.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stayhere.madhab-mondal.me/privkey.pem;

    # Optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router (SPA) pathing
    location / {
        try_files $uri /index.html;
    }

    # Proxy Backend API Requests - only matches /api/* routes
    location /api/ {
        proxy_pass http://stay-here-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache control for static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
