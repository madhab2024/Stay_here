name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Triggers on every push to the main branch

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the latest code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. SSH into EC2 and deploy
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "==> Navigating to project directory..."
            cd /home/ubuntu/Stay_here

            echo "==> Pulling latest code from Git..."
            git pull origin main

            echo "==> Hot-swapping containers with 2 Replicas (Zero Downtime)..."
            docker compose up -d --build --remove-orphans --scale backend=2

            echo "==> Cleaning up old images and volumes..."
            docker image prune -f
            docker volume prune -f

            echo "==> Deployment complete! Container status:"
            docker compose ps
