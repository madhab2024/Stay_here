name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Triggers on every push to the main branch

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the latest code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. SSH into EC2 and deploy
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "==> Navigating to project directory..."
            cd /home/ubuntu/Stay_here

            echo "==> Pulling latest code from Git..."
            git pull origin main

            echo "==> Stopping existing containers..."
            docker compose down

            echo "==> Rebuilding Docker images (no cache for fresh build)..."
            docker compose build --no-cache

            echo "==> Starting containers in detached mode..."
            docker compose up -d

            echo "==> Removing dangling/unused Docker images to free space..."
            docker image prune -f

            echo "==> Deployment complete! Container status:"
            docker compose ps
