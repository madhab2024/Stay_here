version: '3.8'

services:
  # Backend Node.js Service
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: stay-here-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    networks:
      - stay-here-network

  # Frontend Nginx Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time arg for the React app to know where the API is
        VITE_API_BASE_URL: "https://stayhere.madhab-mondal.me"
    container_name: stay-here-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount the SSL certificates from the EC2 Host to the Container
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - stay-here-network

networks:
  stay-here-network:
    driver: bridge
