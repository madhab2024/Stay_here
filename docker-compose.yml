services:
  # Backend Node.js Service
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    # container_name removed to allow scaling to 2+ instances
    restart: always
    ports:
      - "5000:5000" 
    env_file:
      - ./backend/.env
    networks:
      - stay-here-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend Nginx Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time args — baked into the React bundle at docker build time
        VITE_API_BASE_URL: "https://stayhere.madhab-mondal.me"
        VITE_GOOGLE_CLIENT_ID: "190787955600-t96m1f3pq31nui38o4lgbvu06ch3srrf.apps.googleusercontent.com"
        VITE_FIREBASE_API_KEY: "AIzaSyDRiY4s_L2220yGjV2fNov9c-dP179AWRY"
        VITE_FIREBASE_AUTH_DOMAIN: "stay-here-d182c.firebaseapp.com"
        VITE_FIREBASE_PROJECT_ID: "stay-here-d182c"
        VITE_FIREBASE_STORAGE_BUCKET: "stay-here-d182c.firebasestorage.app"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "190787955600"
        VITE_FIREBASE_APP_ID: "1:190787955600:web:4ccd120de36c1ca535e115"
        VITE_FIREBASE_MEASUREMENT_ID: "G-J8Q446BHB6"
    container_name: stay-here-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount the SSL certificates from the EC2 Host to the Container
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - stay-here-network

networks:
  stay-here-network:
    driver: bridge
